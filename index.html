<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>csbrodle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: white; }
        .box-correct { background-color: #4ade80; }
        .box-partial { background-color: #facc15; }
        .box-wrong { background-color: #f87171; }
        .box-default { background-color: white; }
        .sidebar { background-color: #1a1a1a; }
        .header-cell { background-color: #333333; }
    </style>
</head>
<body class="min-h-screen bg-black p-8 font-sans">

    <!-- Title Section -->
    <div class="text-center mb-8">
        <h1 class="text-4xl text-white font-bold tracking-widest uppercase mb-2">csbrodle</h1>
        <p class="text-4xl text-white-400">Guess the character</p>
    </div>

    <!-- Search Bar and Auto-complete -->
    <div class="flex justify-center gap-3 mb-12">
        <input type="text" id="guess-input" placeholder="Type character name" list="character-list" 
            class="w-full max-w-md p-2 rounded text-black outline-none focus:ring-2 focus:ring-blue-500">
        <datalist id="character-list"></datalist>
        <button id="guess-btn" class="bg-white text-black px-6 py-2 rounded font-bold hover:bg-gray-200 transition">
            Guess
        </button>
    </div>


    <!-- Main Game Area -->
    <div class="flex flex-col md:flex-row gap-8 max-w-8xl mx-auto">
        
        <!-- Series Included List -->
        <div class="sidebar w-full md:w-64 p-4 rounded-xl self-start">
            <h2 class="font-bold text-white border-b border-gray-700 pb-2 mb-4">Series Included:</h2>
            <ul class="text-sm space-y-1 text-gray-200" id="series-list">
                <li>New Girl</li>
                <li>The Summer I Turned Pretty</li>
                <li>The Office</li>
                <li>Parks and Recreation</li>
                <li>Brooklyn 99</li>
                <li>The Good Place</li>
            </ul>
        </div>

        <!-- Results -->
        <div class="flex-1 min-w-0">

            <!-- Table Header -->
            <div class="grid grid-cols-8 gap-2 mb-2 text-center text-xs font-bold uppercase tracking-tighter">
                <div class="text-gray-500 p-2">#</div>
                <div class="header-cell p-2 rounded-t-lg">Age (s1)</div>
                <div class="header-cell p-2 rounded-t-lg">Height (cm)</div>
                <div class="header-cell p-2 rounded-t-lg">Hair</div>
                <div class="header-cell p-2 rounded-t-lg">Sex</div>
                <div class="header-cell p-2 rounded-t-lg">Series</div>
            </div>

            <!-- Results Rows Container -->
            <div id="results-container" class="space-y-2">
                
                <!-- Default Row -->
                <div class="grid grid-cols-8 gap-2 text-center text-sm items-center">
                    <div class="text-gray-500">0</div>
                    <div class="box-default p-4 rounded-lg flex items-center justify-center h-16"></div>
                    <div class="box-default p-4 rounded-lg flex items-center justify-center h-16"></div>
                    <div class="box-default p-4 rounded-lg flex items-center justify-center h-16 text-black font-bold"></div>
                    <div class="box-default p-4 rounded-lg flex items-center justify-center h-16 text-black font-bold"></div>
                    <div class="box-default p-4 rounded-lg flex items-center justify-center h-16"></div>
                </div>

            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
